<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="700" height="200" fill="#FAFEF0" rx="12"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">카카오링크 동작 흐름 (Kakao.Link.sendDefault / sendCustom)</text>

  <!-- Boxes -->
  <!-- User -->
  <rect x="30" y="55" width="120" height="48" rx="8" fill="#FEE500" stroke="#d4b800" stroke-width="1.5"/>
  <text x="90" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">사용자</text>
  <text x="90" y="92" text-anchor="middle" font-size="11" fill="#555">(브라우저)</text>

  <!-- App -->
  <rect x="280" y="55" width="140" height="48" rx="8" fill="#4A90D9" stroke="#2a6aab" stroke-width="1.5"/>
  <text x="350" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">웹 애플리케이션</text>
  <text x="350" y="92" text-anchor="middle" font-size="11" fill="#dde">(kakaolink.html)</text>

  <!-- Kakao -->
  <rect x="540" y="55" width="130" height="48" rx="8" fill="#3A3A3A" stroke="#111" stroke-width="1.5"/>
  <text x="605" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#FEE500">Kakao Server</text>
  <text x="605" y="92" text-anchor="middle" font-size="11" fill="#aaa">(Kakao SDK)</text>

  <!-- Arrow 1: User -> App -->
  <line x1="152" y1="79" x2="278" y2="79" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="215" y="70" text-anchor="middle" font-size="10" fill="#333">버튼 클릭</text>

  <!-- Arrow 2: App -> Kakao -->
  <line x1="422" y1="79" x2="538" y2="79" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="480" y="70" text-anchor="middle" font-size="10" fill="#333">Kakao.Link 호출</text>

  <!-- Arrow 3: Kakao -> User (return share popup) -->
  <path d="M605,105 Q605,155 350,155 Q150,155 90,105" fill="none" stroke="#e07b00" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr2)"/>
  <text x="350" y="172" text-anchor="middle" font-size="10" fill="#c05000">카카오톡 공유 팝업 표시 → 친구 선택 → 메시지 전달</text>

  <!-- Markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#e07b00"/>
    </marker>
  </defs>
</svg>
